<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>老人求助位置</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        #info {
            padding: 15px;
            background: #FF6B6B;
            color: white;
            text-align: center;
            font-size: 18px;
        }
        #container {
            width: 100%;
            height: calc(100% - 60px); /* 减去信息栏高度 */
        }
        .tip {
            font-size: 14px;
            margin-top: 5px;
            color: #f0f0f0;
        }
    </style>
    <!-- 引入腾讯地图API -->
    <script src="https://map.qq.com/api/gljs?v=1.exp&key=YOUR_KEY_HERE"></script>
</head>
<body>
    <div id="info">
        <div>⚠️ 您的家人发出了求助</div>
        <div class="tip" id="timeDisplay">获取时间中...</div>
    </div>
    <div id="container"></div>

    <script>
        // 从URL获取参数
        function getQueryParam(name) {
            var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURIComponent(r[2]);
            return null;
        }

        // 获取经纬度和时间
        var lat = getQueryParam('lat');
        var lng = getQueryParam('lng');
        var time = getQueryParam('time');

        // 如果没有经纬度，显示默认位置并提示
        if (!lat || !lng) {
            lat = 39.908;  // 默认北京天安门
            lng = 116.397;
            document.getElementById('timeDisplay').innerText = '未获取到位置信息，显示默认地图';
        } else {
            // 格式化时间（假设time是时间戳，如202603021700）
            if (time) {
                // 简单格式化：假设time是YYYYMMDDHHmm格式，转换为可读字符串
                if (time.length === 14) {
                    var year = time.substr(0,4);
                    var month = time.substr(4,2);
                    var day = time.substr(6,2);
                    var hour = time.substr(8,2);
                    var minute = time.substr(10,2);
                    var second = time.substr(12,2);
                    document.getElementById('timeDisplay').innerText = '求助时间：' + year + '-' + month + '-' + day + ' ' + hour + ':' + minute + ':' + second;
                } else {
                    document.getElementById('timeDisplay').innerText = '求助时间：' + time;
                }
            } else {
                document.getElementById('timeDisplay').innerText = '求助时间未知';
            }
        }

        // 初始化地图
        var map = new TMap.Map('container', {
            center: new TMap.LatLng(lat, lng),
            zoom: 15
        });

        // 添加标记点（大头针）
        var marker = new TMap.Marker({
            position: new TMap.LatLng(lat, lng),
            map: map,
            title: "求助位置"
        });

        // 可选：添加一个信息窗口
        var infoWindow = new TMap.InfoWindow({
            map: map,
            content: "这里是求助者位置",
            position: new TMap.LatLng(lat, lng)
        }).open();
    </script>
</body>
</html>
